<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1920, initial-scale=1"/>
<title>우주에서 온 신호를 해독하라!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800;900&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #00f0ff;
    --primary-glow: rgba(0,240,255,0.6);
    --secondary: #bd00ff;
    --gold: #d4af37;
    --text: #f0f4ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;background:#000;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  .scaler{position:relative;transform-origin:center center;width:1920px;height:1080px;}

  /* ── STAGE ── */
  .stage{
    position:relative;width:1920px;height:1080px;overflow:hidden;
    font-family:'Noto Sans KR',sans-serif;color:var(--text);
    background:
      radial-gradient(ellipse at 12% 10%, rgba(180,0,255,.28) 0%, transparent 40%),
      radial-gradient(ellipse at 85% 16%, rgba(0,80,220,.32) 0%, transparent 44%),
      radial-gradient(ellipse at 50% 60%, rgba(30,0,100,.50) 0%, transparent 42%),
      radial-gradient(ellipse at 50% 110%, rgba(0,60,160,.60) 0%, transparent 34%),
      linear-gradient(160deg, #010008 0%, #03010e 40%, #06021a 100%);
  }

  /* ── STARS ── */
  .stars-layer{position:absolute;inset:0;pointer-events:none;}
  .star{
    position:absolute;border-radius:50%;background:#fff;
    animation:twinkle var(--dur,2.5s) ease-in-out infinite alternate;
    animation-delay:var(--del,0s);
  }
  @keyframes twinkle{
    0%  {opacity:.1;transform:scale(.6);}
    100%{opacity:1; transform:scale(1.2);}
  }

  /* ── LOGO (top-left) ── */
  .logo-wrap{
    position:absolute;top:36px;left:60px;
    z-index:20;
    animation:logoFade 5s ease-in-out infinite;
  }
  @keyframes logoFade{
    0%,100%{filter:drop-shadow(0 0 8px rgba(0,240,255,.3));}
    50%    {filter:drop-shadow(0 0 22px rgba(0,240,255,.7));}
  }
  .logo-wrap img{height:90px;display:block;}

  /* ── TITLE (center) ── */
  .title-wrap{
    position:absolute;top:130px;
    left:50%;transform:translateX(-50%);
    white-space:nowrap;
    text-align:center;z-index:10;
    display:flex;flex-direction:column;align-items:center;
    animation:titleGlow 5s ease-in-out infinite;
  }
  @keyframes titleGlow{
    0%,100%{filter:drop-shadow(0 0 18px rgba(0,240,255,.4));}
    50%    {filter:drop-shadow(0 0 50px rgba(0,240,255,.9));}
  }
  .title{
    display:inline-block;
    font-family:'Noto Sans KR',sans-serif;
    font-size:80px;font-weight:900;letter-spacing:-2px;
    background:linear-gradient(180deg,#ffffff 0%,#00f0ff 55%,#0088ff 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 5px 0 rgba(0,0,60,.9)) drop-shadow(0 14px 22px rgba(0,0,0,.6));
    padding:8px 40px;
  }
  .title::before,.title::after{
    content:"✦";
    -webkit-text-fill-color:rgba(0,240,255,.9);
    font-size:42px;margin:0 18px;vertical-align:14px;
    filter:drop-shadow(0 0 12px var(--primary-glow));
    display:inline-block;
    animation:starSpin 5s linear infinite;
  }
  .title::after{animation-direction:reverse;}
  @keyframes starSpin{
    0%  {transform:rotate(0deg) scale(1);}
    50% {transform:rotate(180deg) scale(1.35);}
    100%{transform:rotate(360deg) scale(1);}
  }
  .subtitle-badge{
    display:inline-block;margin-top:14px;
    padding:9px 30px;border-radius:999px;
    background:rgba(0,240,255,.07);
    border:2px solid rgba(0,240,255,.45);
    color:var(--primary);font-weight:700;
    letter-spacing:3px;font-size:20px;text-transform:uppercase;
    backdrop-filter:blur(8px);
    animation:badgePulse 5s ease-in-out infinite;
  }
  @keyframes badgePulse{
    0%,100%{box-shadow:0 0 0 0 transparent, 0 0 18px rgba(0,240,255,.2);}
    50%    {box-shadow:0 0 0 6px rgba(0,240,255,.1),0 0 36px rgba(0,240,255,.55);}
  }

  /* ── DESCRIPTION BOX ── */
  .description{
    position:absolute;left:88px;top:360px;width:680px;
    padding:42px 46px;border-radius:28px;
    background:linear-gradient(150deg,rgba(0,10,40,.90) 0%,rgba(0,5,25,.90) 100%);
    border:1.5px solid rgba(0,240,255,.30);
    box-shadow:0 18px 60px rgba(0,0,0,.55),inset 0 0 40px rgba(0,240,255,.06);
    backdrop-filter:blur(10px);z-index:10;
    animation:boxGlow 5s ease-in-out infinite;
  }
  @keyframes boxGlow{
    0%,100%{border-color:rgba(0,240,255,.25);box-shadow:0 18px 60px rgba(0,0,0,.55),inset 0 0 30px rgba(0,240,255,.05);}
    50%    {border-color:rgba(0,240,255,.55);box-shadow:0 18px 60px rgba(0,0,0,.55),inset 0 0 50px rgba(0,240,255,.16),0 0 30px rgba(0,240,255,.2);}
  }
  .description h2{
    font-family:'Orbitron',sans-serif;
    font-size:28px;font-weight:900;color:var(--primary);
    margin-bottom:18px;letter-spacing:1px;
    text-shadow:0 0 18px var(--primary-glow);
  }
  .description p{font-size:27px;line-height:1.6;color:#d0e8ff;font-weight:500;word-break:keep-all;}
  .description p strong{color:var(--primary);font-weight:800;}
  .hint{
    margin-top:22px;display:flex;align-items:center;gap:14px;
    font-size:22px;color:var(--gold);font-weight:700;
  }
  .hint-arrow{font-size:28px;animation:arrowBounce 1.2s ease-in-out infinite;display:inline-block;}
  @keyframes arrowBounce{0%,100%{transform:translateX(0);}50%{transform:translateX(10px);}}

  /* ── SPACE STATION ── */
  .station{
    position:absolute;top:310px;right:92px;
    width:860px;height:490px;
    display:flex;align-items:center;justify-content:center;
    z-index:10;
    animation:stationFloat 5s ease-in-out infinite;
  }
  @keyframes stationFloat{
    0%,100%{transform:translateY(0) rotate(0deg);}
    25%    {transform:translateY(-12px) rotate(.25deg);}
    75%    {transform:translateY(9px) rotate(-.25deg);}
  }
  .wing{
    position:absolute;top:50%;
    width:225px;height:300px;
    transform:translateY(-50%);
    background:repeating-linear-gradient(90deg,#0a1e7a 0 14px,#1838b8 14px 26px);
    border:3px solid #060e3c;border-radius:8px;
    box-shadow:0 0 0 3px rgba(0,240,255,.18),0 12px 36px rgba(0,0,0,.55),inset 0 0 20px rgba(255,255,255,.06);
    animation:wingShimmer 5s ease-in-out infinite;
  }
  @keyframes wingShimmer{
    0%,100%{filter:brightness(1);}
    50%    {filter:brightness(1.2) saturate(1.4);}
  }
  .wing::before{
    content:"";position:absolute;inset:7px;
    background:
      repeating-linear-gradient(0deg,transparent 0 40px,rgba(4,14,58,.65) 40px 44px),
      repeating-linear-gradient(90deg,transparent 0 40px,rgba(4,14,58,.55) 40px 44px);
    border-radius:4px;
  }
  .wing::after{
    content:"";position:absolute;top:50%;
    width:44px;height:14px;
    background:linear-gradient(180deg,#b0bcd8,#606c90);
    border:2px solid #1c2244;transform:translateY(-50%);
    box-shadow:0 2px 6px rgba(0,0,0,.4);
  }
  .wing.left {left:0;} .wing.left::after {right:-42px;}
  .wing.right{right:0;}.wing.right::after{left:-42px;}

  .qr-body{
    position:relative;width:400px;height:400px;padding:16px;
    background:linear-gradient(145deg,#f0f4ff,#d0d8f0);
    border-radius:20px;border:5px solid var(--primary);
    box-shadow:
      0 0 0 7px rgba(0,5,30,.95),
      0 0 60px rgba(0,240,255,.8),
      0 22px 50px rgba(0,0,0,.6),
      inset 0 0 22px rgba(255,255,255,.5);
    animation:qrGlow 5s ease-in-out infinite;
  }
  @keyframes qrGlow{
    0%,100%{box-shadow:0 0 0 7px rgba(0,5,30,.95),0 0 40px rgba(0,240,255,.5),0 22px 50px rgba(0,0,0,.6),inset 0 0 22px rgba(255,255,255,.5);}
    50%    {box-shadow:0 0 0 7px rgba(0,5,30,.95),0 0 90px rgba(0,240,255,1.0),0 22px 50px rgba(0,0,0,.6),inset 0 0 22px rgba(255,255,255,.5);}
  }
  .qr-body img{width:368px;height:368px;display:block;object-fit:contain;background:#fff;border-radius:8px;}
  .screws{position:absolute;inset:0;pointer-events:none;}
  .screws span{
    position:absolute;width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle,#fff 10%,#7a8299 60%,#3a4161 100%);
    box-shadow:0 1px 3px rgba(0,0,0,.4);
  }
  .screws span:nth-child(1){top:6px;left:6px;}
  .screws span:nth-child(2){top:6px;right:6px;}
  .screws span:nth-child(3){bottom:6px;left:6px;}
  .screws span:nth-child(4){bottom:6px;right:6px;}
  .qr-label{
    position:absolute;left:50%;bottom:-58px;transform:translateX(-50%);
    white-space:nowrap;background:var(--primary);color:#000;
    padding:9px 28px;border-radius:999px;
    font-family:'Orbitron',sans-serif;font-weight:900;font-size:22px;letter-spacing:2px;
    box-shadow:0 6px 0 #0088aa,0 12px 24px rgba(0,0,0,.45);
    animation:labelPulse 5s ease-in-out infinite;
  }
  @keyframes labelPulse{
    0%,100%{transform:translateX(-50%) scale(1);}
    50%    {transform:translateX(-50%) scale(1.07);}
  }

  /* ── OBSERVATORY SVG ── */
  .observatory{
    position:absolute;left:40px;bottom:0;width:680px;
    z-index:11;
    animation:obsFloat 5s ease-in-out infinite;
    animation-delay:-1.25s;
  }
  @keyframes obsFloat{
    0%,100%{transform:translateY(0);}
    50%    {transform:translateY(-14px);}
  }

  /* ── EARTH ── */
  .earth-wrap{
    position:absolute;left:50%;bottom:-1380px;
    transform:translateX(-50%);
    animation:earthPulse 5s ease-in-out infinite;
  }
  @keyframes earthPulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.09);}}
  .earth{
    width:3200px;height:3200px;border-radius:50%;
    filter:brightness(0.55) saturate(0.7);
    background:
      radial-gradient(circle at 50% 28%,rgba(255,255,255,.10),transparent 43%),
      radial-gradient(circle at 28% 57%,#2d6e4e 0 5%,transparent 6%),
      radial-gradient(circle at 62% 44%,#3b8a5a 0 7%,transparent 8%),
      radial-gradient(circle at 72% 63%,#2a6548 0 6%,transparent 7%),
      radial-gradient(circle at 44% 73%,#3d8a5c 0 4%,transparent 5%),
      linear-gradient(180deg,#1050a8 0%,#0d3e88 45%,#081e50 100%);
    box-shadow:inset 0 55px 110px rgba(255,255,255,.08),inset 0 -70px 160px rgba(0,0,0,.7),0 -8px 60px rgba(0,100,180,.18);
  }
  .earth-glow{
    position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    width:2000px;height:160px;
    background:radial-gradient(ellipse at center bottom,rgba(0,160,220,.30),transparent 68%);
    filter:blur(16px);
    animation:glowPulse 5s ease-in-out infinite;
  }
  @keyframes glowPulse{0%,100%{opacity:.75;}50%{opacity:1;}}

  /* ── SIGNAL SVG ── */
  .signal-svg{position:absolute;inset:0;pointer-events:none;z-index:8;overflow:visible;}
  .signal-glow{stroke:rgba(0,240,255,.15);stroke-width:20;fill:none;filter:blur(8px);}
  .signal-line{
    stroke:url(#sigGrad);stroke-width:4.5;
    stroke-dasharray:18 13;fill:none;
    filter:url(#sigFilter);
    animation:dashMove 1.1s linear infinite;
  }
  @keyframes dashMove{to{stroke-dashoffset:-124;}}

  /* ── PLANETS ── */
  .planet{position:absolute;border-radius:50%;}
  .p1{
    width:72px;height:72px;top:155px;right:260px;
    background:radial-gradient(circle at 32% 32%,#ffd08c,#e07020);
    box-shadow:inset -10px -10px 20px rgba(0,0,0,.4),0 0 28px rgba(255,140,40,.4);
    animation:pDrift1 5s ease-in-out infinite;
  }
  .p2{
    width:52px;height:52px;top:505px;left:805px;
    background:radial-gradient(circle at 32% 32%,#a8c4ff,#4060d0);
    box-shadow:inset -8px -8px 16px rgba(0,0,0,.4),0 0 20px rgba(60,100,255,.35);
    animation:pDrift2 5s ease-in-out infinite;animation-delay:-2s;
  }
  .p3{
    width:88px;height:88px;top:235px;left:820px;
    background:radial-gradient(circle at 32% 32%,#f5ccfa,#9e4eb8);
    box-shadow:inset -12px -12px 24px rgba(0,0,0,.4),0 0 30px rgba(160,60,220,.35);
    animation:pDrift3 5s ease-in-out infinite;animation-delay:-3.5s;
  }
  .p3::after{
    content:"";position:absolute;left:-28px;right:-28px;top:50%;
    height:11px;border-radius:50%;
    background:linear-gradient(90deg,transparent,rgba(0,240,255,.7) 38%,rgba(0,240,255,.7) 62%,transparent);
    transform:translateY(-50%) rotate(-12deg);
  }
  @keyframes pDrift1{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-16px) rotate(8deg);}}
  @keyframes pDrift2{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(12px) scale(1.08);}}
  @keyframes pDrift3{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-10px) rotate(-5deg);}}

  /* ── METEOR ── */
  .meteor{
    position:absolute;width:160px;height:3px;
    background:linear-gradient(90deg,transparent,rgba(0,240,255,.9));
    border-radius:2px;top:195px;left:-160px;transform:rotate(-20deg);
    animation:meteorFly 5s ease-in-out infinite;opacity:0;
  }
  @keyframes meteorFly{
    0%  {left:-160px;top:195px;opacity:0;}
    8%  {opacity:1;}
    22% {left:600px;top:80px;opacity:0;}
    100%{left:600px;top:80px;opacity:0;}
  }
  .meteor2{animation-delay:-2.5s;top:305px;width:100px;background:linear-gradient(90deg,transparent,rgba(189,0,255,.8));}

  /* ── RIPPLE (antenna) ── */
  .ripple-wrap{position:absolute;left:480px;top:700px;z-index:9;pointer-events:none;}
  .ripple{
    position:absolute;border-radius:50%;
    border:2.5px solid rgba(0,240,255,.7);
    transform:translate(-50%,-50%) scale(0);
    animation:rippleOut 2.5s ease-out infinite;
  }
  .ripple:nth-child(2){animation-delay:.83s;}
  .ripple:nth-child(3){animation-delay:1.66s;}
  @keyframes rippleOut{
    0%  {width:12px;height:12px;opacity:1;transform:translate(-50%,-50%);}
    100%{width:150px;height:150px;opacity:0;transform:translate(-50%,-50%);}
  }
</style>
</head>
<body>
<div class="scaler" id="scaler">
<div class="stage">

  <div class="stars-layer" id="starsLayer"></div>
  <div class="meteor"></div>
  <div class="meteor meteor2"></div>
  <div class="planet p1"></div>
  <div class="planet p2"></div>
  <div class="planet p3"></div>

  <!-- LOGO -->

<script>
// Stars
(function(){
  const layer=document.getElementById('starsLayer');
  const cols=['#ffffff','#ffffff','#ffffff','#b0f0ff','#bd00ff','#80c0ff'];
  for(let i=0;i<150;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.8+0.6;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*88}%;left:${Math.random()*100}%;
      --dur:${(Math.random()*3+1.5).toFixed(2)}s;--del:-${(Math.random()*5).toFixed(2)}s;
      background:${cols[Math.floor(Math.random()*cols.length)]};opacity:${(Math.random()*.5+.2).toFixed(2)};`;
    layer.appendChild(s);
  }
})();
// Scale
function resize(){
  const sc=document.getElementById('scaler');
  const scale=Math.min(window.innerWidth/1920,window.innerHeight/1080);
  sc.style.transform=`scale(${scale})`;
}
resize();window.addEventListener('resize',resize);
</script>
