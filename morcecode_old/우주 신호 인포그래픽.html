<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1920, initial-scale=1"/>
<title>우주에서 온 신호를 해독하라!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-top: #07031a;
    --bg-mid: #0e0630;
    --bg-bot: #160a42;
    --accent-cyan: #8ef5ff;
    --accent-yellow: #ffe27a;
    --accent-pink: #ffb5e8;
    --text: #f5f5ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── 스케일 래퍼 ── */
  .scaler {
    position: relative;
    transform-origin: center center;
  }

  /* ── 1920×1080 스테이지 ── */
  .stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: "Noto Sans KR", -apple-system, sans-serif;
    color: var(--text);
    background:
      radial-gradient(ellipse at 18% 8%, rgba(110,70,255,.45), transparent 52%),
      radial-gradient(ellipse at 82% 20%, rgba(40,160,255,.30), transparent 58%),
      radial-gradient(ellipse at 50% 110%, rgba(20,80,200,.55), transparent 45%),
      linear-gradient(170deg, var(--bg-top) 0%, var(--bg-mid) 55%, var(--bg-bot) 100%);
  }

  /* ══════════ 별 레이어 ══════════ */
  .stars-layer {
    position: absolute; inset: 0; pointer-events: none;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--dur, 2.5s) ease-in-out infinite alternate;
    animation-delay: var(--del, 0s);
    opacity: .7;
  }
  @keyframes twinkle {
    0%   { opacity: .15; transform: scale(.7); }
    100% { opacity: 1;   transform: scale(1.15); }
  }

  /* ══════════ 지구 ══════════ */
  .earth-wrap {
    position: absolute;
    left: 50%; bottom: -1360px;
    transform: translateX(-50%);
    animation: earthPulse 5s ease-in-out infinite;
  }
  @keyframes earthPulse {
    0%,100% { filter: brightness(1); }
    50%     { filter: brightness(1.08); }
  }
  .earth {
    width: 3200px; height: 3200px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 28%, rgba(255,255,255,.14), transparent 44%),
      radial-gradient(circle at 28% 58%, #2d6e4e 0 5%, transparent 6%),
      radial-gradient(circle at 62% 44%, #3b8a5a 0 7%, transparent 8%),
      radial-gradient(circle at 72% 64%, #2a6548 0 6%, transparent 7%),
      radial-gradient(circle at 44% 74%, #3d8a5c 0 4%, transparent 5%),
      linear-gradient(180deg, #1e7bd8 0%, #1763b4 45%, #0f4a8a 100%);
    box-shadow:
      inset 0 55px 110px rgba(255,255,255,.14),
      inset 0 -70px 160px rgba(0,0,0,.5),
      0 -15px 100px rgba(80,180,255,.38);
  }
  .earth-glow {
    position: absolute;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 2000px; height: 220px;
    background: radial-gradient(ellipse at center bottom, rgba(140,220,255,.6), transparent 70%);
    filter: blur(10px);
    animation: glowPulse 5s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100% { opacity: .8; }
    50%     { opacity: 1.0; }
  }

  /* ══════════ 제목 ══════════ */
  .title-wrap {
    position: absolute;
    top: 52px; left: 0; right: 0;
    text-align: center;
    z-index: 10;
    animation: titleGlow 5s ease-in-out infinite;
  }
  @keyframes titleGlow {
    0%,100% { filter: drop-shadow(0 0 18px rgba(255,200,80,.35)); }
    50%     { filter: drop-shadow(0 0 42px rgba(255,200,80,.75)); }
  }
  .title {
    display: inline-block;
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(180deg, #fffbe0 0%, #ffd86b 52%, #ff9c3a 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 6px 0 rgba(40,10,80,.9)) drop-shadow(0 16px 24px rgba(0,0,0,.55));
    padding: 8px 40px;
  }
  .title::before, .title::after {
    content: "✦";
    -webkit-text-fill-color: var(--accent-cyan);
    font-size: 48px;
    margin: 0 22px;
    vertical-align: 18px;
    filter: drop-shadow(0 0 14px rgba(142,245,255,.9));
    animation: starSpin 5s linear infinite;
    display: inline-block;
  }
  .title::after { animation-direction: reverse; }
  @keyframes starSpin {
    0%   { transform: rotate(0deg) scale(1); }
    50%  { transform: rotate(180deg) scale(1.3); }
    100% { transform: rotate(360deg) scale(1); }
  }
  .subtitle-badge {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 30px;
    border-radius: 999px;
    background: rgba(255,255,255,.07);
    border: 2px solid rgba(142,245,255,.4);
    color: var(--accent-cyan);
    font-weight: 700;
    letter-spacing: 3px;
    font-size: 22px;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    animation: badgePulse 5s ease-in-out infinite;
  }
  @keyframes badgePulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(142,245,255,.0), 0 0 20px rgba(142,245,255,.2); }
    50%     { box-shadow: 0 0 0 6px rgba(142,245,255,.12), 0 0 35px rgba(142,245,255,.5); }
  }

  /* ══════════ 설명 박스 ══════════ */
  .description {
    position: absolute;
    left: 100px; top: 342px;
    width: 680px;
    padding: 44px 48px;
    border-radius: 32px;
    background: linear-gradient(160deg, rgba(28,18,78,.82) 0%, rgba(16,10,52,.82) 100%);
    border: 2px solid rgba(142,245,255,.3);
    box-shadow:
      0 20px 70px rgba(0,0,0,.45),
      inset 0 0 50px rgba(142,245,255,.07);
    backdrop-filter: blur(10px);
    z-index: 10;
    animation: boxGlow 5s ease-in-out infinite;
  }
  @keyframes boxGlow {
    0%,100% { box-shadow: 0 20px 70px rgba(0,0,0,.45), inset 0 0 50px rgba(142,245,255,.07), 0 0 0 1px rgba(142,245,255,.1); }
    50%     { box-shadow: 0 20px 70px rgba(0,0,0,.45), inset 0 0 50px rgba(142,245,255,.18), 0 0 30px rgba(142,245,255,.25); }
  }
  .description h2 {
    font-size: 36px; font-weight: 900;
    color: var(--accent-yellow);
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }
  .description p {
    font-size: 29px; line-height: 1.58;
    color: #eaeaff; font-weight: 500;
    word-break: keep-all;
  }
  .description p strong { color: var(--accent-cyan); font-weight: 800; }
  .hint {
    margin-top: 24px;
    display: flex; align-items: center; gap: 14px;
    font-size: 23px; color: #ffd86b; font-weight: 700;
  }
  .hint-arrow {
    font-size: 30px;
    animation: arrowBounce 1.25s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes arrowBounce {
    0%,100% { transform: translateX(0); }
    50%     { transform: translateX(10px); }
  }

  /* ══════════ 우주정거장 ══════════ */
  .station {
    position: absolute;
    top: 305px; right: 100px;
    width: 860px; height: 480px;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    animation: stationFloat 5s ease-in-out infinite;
  }
  @keyframes stationFloat {
    0%,100% { transform: translateY(0px) rotate(0deg); }
    25%     { transform: translateY(-10px) rotate(.3deg); }
    75%     { transform: translateY(8px) rotate(-.3deg); }
  }
  .wing {
    position: absolute; top: 50%;
    width: 220px; height: 295px;
    transform: translateY(-50%);
    background:
      repeating-linear-gradient(90deg, #1a38a0 0 15px, #2650c0 15px 28px);
    border: 3px solid #0a1848;
    border-radius: 8px;
    box-shadow:
      0 0 0 3px rgba(142,245,255,.18),
      0 12px 35px rgba(0,0,0,.55),
      inset 0 0 22px rgba(255,255,255,.07);
    animation: wingShimmer 5s ease-in-out infinite;
  }
  @keyframes wingShimmer {
    0%,100% { filter: brightness(1); }
    50%     { filter: brightness(1.18) saturate(1.3); }
  }
  .wing::before {
    content: "";
    position: absolute; inset: 7px;
    background:
      repeating-linear-gradient(0deg, transparent 0 42px, rgba(8,22,65,.6) 42px 46px),
      repeating-linear-gradient(90deg, transparent 0 42px, rgba(8,22,65,.5) 42px 46px);
    border-radius: 4px;
  }
  .wing::after {
    content: "";
    position: absolute; top: 50%;
    width: 42px; height: 14px;
    background: linear-gradient(180deg, #b8c4dc, #6a7aa0);
    border: 2px solid #222a48;
    transform: translateY(-50%);
    box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  .wing.left  { left: 0; }
  .wing.left::after  { right: -40px; }
  .wing.right { right: 0; }
  .wing.right::after { left: -40px; }

  .qr-body {
    position: relative;
    width: 390px; height: 390px;
    padding: 16px;
    background: linear-gradient(145deg, #f6f6ff, #d4d8ea);
    border-radius: 20px;
    border: 5px solid #8ef5ff;
    box-shadow:
      0 0 0 7px rgba(8,12,42,.95),
      0 0 50px rgba(142,245,255,.7),
      0 22px 50px rgba(0,0,0,.6),
      inset 0 0 22px rgba(255,255,255,.55);
    animation: qrGlow 5s ease-in-out infinite;
  }
  @keyframes qrGlow {
    0%,100% { box-shadow: 0 0 0 7px rgba(8,12,42,.95), 0 0 40px rgba(142,245,255,.5), 0 22px 50px rgba(0,0,0,.6), inset 0 0 22px rgba(255,255,255,.55); }
    50%     { box-shadow: 0 0 0 7px rgba(8,12,42,.95), 0 0 80px rgba(142,245,255,.95), 0 22px 50px rgba(0,0,0,.6), inset 0 0 22px rgba(255,255,255,.55); }
  }
  .qr-body img {
    width: 358px; height: 358px;
    display: block; object-fit: contain;
    background: #fff; border-radius: 8px;
  }
  .screws { position: absolute; inset: 0; pointer-events: none; }
  .screws span {
    position: absolute; width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle, #fff 10%, #7a8299 60%, #3a4161 100%);
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .screws span:nth-child(1) { top: 6px; left: 6px; }
  .screws span:nth-child(2) { top: 6px; right: 6px; }
  .screws span:nth-child(3) { bottom: 6px; left: 6px; }
  .screws span:nth-child(4) { bottom: 6px; right: 6px; }
  .qr-label {
    position: absolute; left: 50%; bottom: -56px;
    transform: translateX(-50%);
    white-space: nowrap;
    background: #ffd86b; color: #2a1a00;
    padding: 9px 26px; border-radius: 999px;
    font-weight: 900; font-size: 23px; letter-spacing: 2px;
    box-shadow: 0 6px 0 #a06400, 0 12px 24px rgba(0,0,0,.4);
    animation: labelBounce 5s ease-in-out infinite;
  }
  @keyframes labelBounce {
    0%,100% { transform: translateX(-50%) scale(1); }
    50%     { transform: translateX(-50%) scale(1.06); }
  }

  /* ══════════ 과학관 ══════════ */
  .observatory {
    position: absolute;
    left: 100px; bottom: 52px;
    width: 560px;
    z-index: 11;
    filter: drop-shadow(0 22px 28px rgba(0,0,0,.6));
    animation: obsFloat 5s ease-in-out infinite;
    animation-delay: -1.25s;
  }
  @keyframes obsFloat {
    0%,100% { transform: translateY(0px); }
    50%     { transform: translateY(-14px); }
  }
  .observatory img { width: 100%; display: block; }

  /* ══════════ 교신 SVG ══════════ */
  .signal-svg {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 8;
    overflow: visible;
  }

  /* 메인 점선 */
  .signal-line {
    stroke: url(#signalGrad);
    stroke-width: 4.5;
    stroke-dasharray: 18 14;
    fill: none;
    filter: url(#glow);
    animation: dashMove 1.2s linear infinite;
  }
  @keyframes dashMove { to { stroke-dashoffset: -128; } }

  /* 글로우 레이어 (두꺼운 흐린 선) */
  .signal-glow {
    stroke: rgba(142,245,255,.18);
    stroke-width: 18;
    fill: none;
    filter: blur(6px);
  }

  /* ══════════ 행성들 ══════════ */
  .planet { position: absolute; border-radius: 50%; }
  .p1 {
    width: 70px; height: 70px; top: 162px; right: 265px;
    background: radial-gradient(circle at 32% 32%, #ffd18c, #e07a2a);
    box-shadow: inset -10px -10px 20px rgba(0,0,0,.4), 0 0 28px rgba(255,160,60,.4);
    animation: planetDrift1 5s ease-in-out infinite;
  }
  @keyframes planetDrift1 {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50%     { transform: translateY(-16px) rotate(8deg); }
  }
  .p2 {
    width: 52px; height: 52px; top: 510px; left: 810px;
    background: radial-gradient(circle at 32% 32%, #a8c4ff, #4e6ed0);
    box-shadow: inset -8px -8px 16px rgba(0,0,0,.4), 0 0 20px rgba(80,120,255,.35);
    animation: planetDrift2 5s ease-in-out infinite;
    animation-delay: -2s;
  }
  @keyframes planetDrift2 {
    0%,100% { transform: translateY(0) scale(1); }
    50%     { transform: translateY(12px) scale(1.08); }
  }
  .p3 {
    width: 86px; height: 86px; top: 240px; left: 830px;
    background: radial-gradient(circle at 32% 32%, #f7cffa, #a254b8);
    box-shadow: inset -12px -12px 24px rgba(0,0,0,.4), 0 0 30px rgba(180,80,220,.35);
    animation: planetDrift3 5s ease-in-out infinite;
    animation-delay: -3.5s;
  }
  @keyframes planetDrift3 {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50%     { transform: translateY(-10px) rotate(-5deg); }
  }
  .p3::after {
    content: "";
    position: absolute; left: -26px; right: -26px; top: 50%;
    height: 11px; border-radius: 50%;
    background: linear-gradient(90deg, transparent, #f5d38a 38%, #f5d38a 62%, transparent);
    transform: translateY(-50%) rotate(-12deg);
    opacity: .85;
    animation: ringPulse 5s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%,100% { opacity: .7; }
    50%     { opacity: 1; }
  }

  /* ══════════ 유성 ══════════ */
  .meteor {
    position: absolute;
    width: 160px; height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.9));
    border-radius: 2px;
    top: 200px; left: -160px;
    transform: rotate(-20deg);
    animation: meteorFly 5s ease-in-out infinite;
    opacity: 0;
  }
  @keyframes meteorFly {
    0%   { left: -160px; top: 200px; opacity: 0; }
    8%   { opacity: 1; }
    22%  { left: 600px; top: 82px; opacity: 0; }
    100% { left: 600px; top: 82px; opacity: 0; }
  }
  .meteor2 {
    animation-delay: -2.5s;
    top: 310px; width: 100px;
    background: linear-gradient(90deg, transparent, rgba(142,245,255,.8));
  }

  /* ══════════ 신호 파문 (과학관 안테나에서) ══════════ */
  .ripple-wrap {
    position: absolute;
    left: 356px; top: 756px;
    z-index: 9; pointer-events: none;
  }
  .ripple {
    position: absolute;
    border-radius: 50%;
    border: 2.5px solid rgba(142,245,255,.7);
    transform: translate(-50%,-50%) scale(0);
    animation: rippleOut 2.5s ease-out infinite;
  }
  .ripple:nth-child(2) { animation-delay: .83s; }
  .ripple:nth-child(3) { animation-delay: 1.66s; }
  @keyframes rippleOut {
    0%   { width: 12px; height: 12px; opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { width: 140px; height: 140px; opacity: 0; transform: translate(-50%,-50%) scale(1); }
  }
</style>
</head>
<body>
<div class="scaler" id="scaler">
<div class="stage">

  <!-- 별 레이어 -->
  <div class="stars-layer" id="starsLayer"></div>

  <!-- 유성 -->
  <div class="meteor"></div>
  <div class="meteor meteor2"></div>

  <!-- 작은 행성들 -->
  <div class="planet p1"></div>
  <div class="planet p2"></div>
  <div class="planet p3"></div>

  <!-- 제목 -->
  <div class="title-wrap">
    <div class="title">우주에서 온 신호를 해독하라!</div>
    <div class="subtitle-badge">ART VALLEY · SPACE MISSION</div>
  </div>

  <!-- 설명 박스 -->
  <div class="description">
    <h2>🛸 미션 안내</h2>
    <p>아트밸리 친구들이 <strong>우주에서 온 신호</strong>를 받아서<br><strong>우주정거장과 교신</strong>을 하려고 해요!</p>
    <p style="margin-top:14px;">소리를 잘 듣고, 우측 <strong>QR 코드</strong>를 통해<br>정답을 입력하세요!</p>
    <div class="hint">
      <span class="hint-arrow">➜</span>
      <span>우측 QR 코드를 스캔하여 정답 제출!</span>
    </div>
  </div>

  <!-- 교신 신호 SVG -->
  <svg class="signal-svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <defs>
      <linearGradient id="signalGrad" x1="0" y1="1" x2="1" y2="0">
        <stop offset="0%"   stop-color="#8ef5ff" stop-opacity=".3"/>
        <stop offset="45%"  stop-color="#8ef5ff" stop-opacity="1"/>
        <stop offset="100%" stop-color="#ffd86b" stop-opacity="1"/>
      </linearGradient>
      <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- 글로우 베이스 -->
    <path class="signal-glow"
      d="M 356 756 C 650 500, 1050 440, 1510 555"/>

    <!-- 메인 점선 -->
    <path class="signal-line"
      d="M 356 756 C 650 500, 1050 440, 1510 555"/>

    <!-- 신호 탄환: 경로를 따라 이동 -->
    <circle r="9" fill="#fff" filter="url(#glow)">
      <animateMotion dur="2.5s" repeatCount="indefinite" rotate="auto">
        <mpath href="#sigPath"/>
      </animateMotion>
    </circle>
    <circle r="5" fill="#8ef5ff">
      <animateMotion dur="2.5s" repeatCount="indefinite" rotate="auto" begin="0.4s">
        <mpath href="#sigPath"/>
      </animateMotion>
    </circle>
    <circle r="5" fill="#ffd86b">
      <animateMotion dur="2.5s" repeatCount="indefinite" rotate="auto" begin="0.8s">
        <mpath href="#sigPath"/>
      </animateMotion>
    </circle>

    <!-- 경로 참조용 (invisible) -->
    <path id="sigPath" d="M 356 756 C 650 500, 1050 440, 1510 555" fill="none"/>
  </svg>

  <!-- 안테나 파문 -->
  <div class="ripple-wrap">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
  </div>

  <!-- 우주정거장 (QR 코드) -->
  <div class="station">
    <div class="wing left"></div>
    <div class="qr-body">
      <div class="screws"><span></span><span></span><span></span><span></span></div>
      <img src="qrcode.png" alt="정답 제출 QR"/>
      <div class="qr-label">SCAN ME</div>
    </div>
    <div class="wing right"></div>
  </div>

  <!-- 지구 -->
  <div class="earth-glow"></div>
  <div class="earth-wrap">
    <div class="earth"></div>
  </div>

  <!-- 과학관 -->
  <div class="observatory">
    <img src="observatory.png" alt="아트밸리 과학관"/>
  </div>

</div><!-- .stage -->
</div><!-- .scaler -->

<script>
  /* ── 별 생성 ── */
  (function() {
    const layer = document.getElementById('starsLayer');
    const colors = ['#ffffff','#ffffff','#ffffff','#cfeeff','#ffe27a','#ffb5e8'];
    for (let i = 0; i < 140; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() * 2.8 + 0.8;
      const dur = (Math.random() * 3 + 1.5).toFixed(2);
      const del = (Math.random() * 5).toFixed(2);
      s.style.cssText = `
        width:${sz}px; height:${sz}px;
        top:${Math.random()*85}%;
        left:${Math.random()*100}%;
        --dur:${dur}s; --del:-${del}s;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        opacity:${(Math.random()*.5+.3).toFixed(2)};
      `;
      layer.appendChild(s);
    }
  })();

  /* ── 뷰포트에 맞게 스케일 ── */
  function resize() {
    const scaler = document.getElementById('scaler');
    const sw = window.innerWidth, sh = window.innerHeight;
    const scale = Math.min(sw / 1920, sh / 1080);
    scaler.style.transform = `scale(${scale})`;
    scaler.style.width  = '1920px';
    scaler.style.height = '1080px';
  }
  resize();
  window.addEventListener('resize', resize);
</script>
