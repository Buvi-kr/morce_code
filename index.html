<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우주 신호 해독 센터 | COSMIC DECODER</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.6);
            --secondary: #bd00ff;
            --secondary-glow: rgba(189, 0, 255, 0.4);
            --success: #00ffaa;
            --danger: #ff0055;
            --glass: rgba(10, 15, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --bg-dark: #02050a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Noto Sans KR', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* --- Starfield Background --- */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: moveStars linear infinite;
        }

        @keyframes moveStars {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-100vh);
            }
        }

        /* --- Header --- */
        header {
            padding: 15px 20px;
            z-index: 110;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            height: 28px;
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        .main-title {
            font-family: 'Orbitron', 'Noto Sans KR';
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
            margin: 0;
            letter-spacing: 0px;
        }

        .agent-input-wrap {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
        }

        .agent-label {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: #888;
        }

        .agent-input {
            background: transparent;
            border: none;
            color: var(--primary);
            font-family: 'Orbitron';
            font-size: 0.9rem;
            outline: none;
            width: 100px;
        }

        /* --- Workspace --- */
        .workspace-wrap {
            position: sticky;
            top: 60px;
            z-index: 100;
            padding: 15px;
            margin-bottom: 10px;
        }

        .decode-machine {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .code-display {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .slot {
            flex: 1;
            max-width: 65px;
            height: 75px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #222;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron';
            font-size: 2.5rem;
            font-weight: 900;
            color: #333;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slot.active {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow), inset 0 0 10px var(--primary-glow);
            animation: breathe 1.5s infinite alternate;
        }

        @keyframes breathe {
            from {
                opacity: 0.6;
                transform: scale(1);
            }

            to {
                opacity: 1;
                transform: scale(1.02);
            }
        }

        .slot.filled {
            color: #fff;
            background: rgba(0, 240, 255, 0.05);
        }

        .control-panel {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Noto Sans KR';
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-clear {
            background: #1a1f26;
            color: #666;
            border: 1px solid #333;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #fff;
            box-shadow: 0 10px 20px rgba(0, 240, 255, 0.2);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* --- Morse Grid --- */
        main {
            flex: 1;
            padding: 15px;
            z-index: 10;
            padding-bottom: 100px;
        }

        .grid-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .grid-title {
            font-family: 'Orbitron';
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 2px;
        }

        .morse-grid {
            width: 100%;
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(4, 1fr);
        }

        .morse-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid var(--glass-border);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .morse-btn.active {
            background: rgba(0, 240, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .m-char {
            font-family: 'Orbitron';
            font-size: 1.6rem;
            color: var(--primary);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 6px;
        }

        .m-code {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 6px;
            border-radius: 6px;
        }

        .dot {
            width: 5px;
            height: 5px;
            background: #fff;
            border-radius: 50%;
        }

        .dash {
            width: 14px;
            height: 5px;
            background: #fff;
            border-radius: 3px;
        }

        /* --- Transitions Layers --- */
        #fail-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 85, 0.15);
            z-index: 6000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        #fail-layer.active {
            display: flex;
            animation: screenGlitch 0.2s infinite;
        }

        @keyframes screenGlitch {
            0% {
                clip-path: inset(0 0 0 0);
                transform: translate(0);
            }

            20% {
                clip-path: inset(10% 0 30% 0);
                transform: translate(-5px, 2px);
            }

            40% {
                clip-path: inset(50% 0 10% 0);
                transform: translate(5px, -2px);
            }

            60% {
                clip-path: inset(20% 0 40% 0);
                transform: translate(-2px, 5px);
            }

            80% {
                clip-path: inset(40% 0 20% 0);
                transform: translate(2px, -5px);
            }

            100% {
                clip-path: inset(0 0 0 0);
                transform: translate(0);
            }
        }

        .fail-text {
            font-family: 'Orbitron';
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 20px #ff0055;
            font-weight: 900;
            letter-spacing: 5px;
            text-align: center;
            padding: 0 20px;
        }

        #scan-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 5000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        #scan-layer.active {
            display: flex;
        }

        .scan-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(var(--primary-glow) 1px, transparent 1px), linear-gradient(90deg, var(--primary-glow) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 10s linear infinite;
        }

        @keyframes gridMove {
            from {
                transform: perspective(500px) rotateX(60deg) translateY(0);
            }

            to {
                transform: perspective(500px) rotateX(60deg) translateY(50px);
            }
        }

        .decode-text {
            font-family: 'Orbitron';
            font-size: 1.5rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-top: 30px;
            text-shadow: 0 0 15px var(--primary-glow);
            animation: scanBlink 0.6s infinite;
            text-align: center;
            padding: 0 20px;
        }

        @keyframes scanBlink {
            50% {
                opacity: 0.3;
            }
        }

        .progress-bar {
            width: 260px;
            height: 10px;
            border: 1px solid var(--primary);
            margin-top: 30px;
            position: relative;
            border-radius: 5px;
            overflow: hidden;
            background: rgba(0, 240, 255, 0.1);
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: width 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* --- Certificate Screen --- */
        #screen-certificate {
            display: none;
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0a1526 0%, #000 100%);
            z-index: 1000;
            flex-direction: column;
        }

        .cert-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }

        #screen-certificate.active {
            display: flex;
        }

        /* --- Login Layer --- */
        #screen-login {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: radial-gradient(circle at center, #0a1526 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 50px var(--primary-glow);
        }

        .login-title {
            font-family: 'Orbitron', 'Noto Sans KR';
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            font-family: 'Orbitron';
            margin-bottom: 20px;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Noto Sans KR';
            transition: 0.3s;
        }

        .login-btn:hover {
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* 인증서 카드 메인 컨테이너 (수직 간격 최적화) */
        .cert-card-premium {
            background: #fff;
            border: 10px solid #FFD700;
            border-radius: 32px;
            padding: 15px 20px; /* 위아래 간격 축소 */
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px; /* 요소 간 간격 축소 */
            color: #333;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            position: relative;
            flex-shrink: 0;
            margin-bottom: 20px;
            animation: certEntrance 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            overflow: hidden;
        }

        @keyframes certEntrance {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .cert-logo {
            width: 160px;
            margin-bottom: 5px;
            z-index: 1;
        }

        .cert-badge {
            background: #a67c00;
            color: #fff;
            padding: 8px 24px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 1.1rem;
            transform: none;
            margin: 5px 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 1;
        }

        .cert-nick-wrap {
            text-align: center;
            margin: 5px 0;
            z-index: 1;
        }

        .cert-nick {
            font-size: 2.2rem;
            font-weight: 900;
            color: #000;
            display: block;
            line-height: 1.2;
        }

        .cert-sub {
            font-size: 13px;
            color: #666;
            font-weight: 600;
        }

        .cert-stats-row {
            display: flex;
            gap: 10px;
            width: 100%;
            margin: 5px 0;
            z-index: 1;
        }

        .c-stat-box {
            flex: 1;
            background: #f4f7f9;
            border-radius: 14px;
            padding: 10px;
            text-align: center;
        }

        .c-stat-lbl {
            font-size: 9px;
            color: #99a;
            font-weight: 700;
            text-transform: uppercase;
        }

        .c-stat-val {
            font-size: 18px;
            font-weight: 800;
            color: #2c3e50;
        }

        .cert-msg {
            font-size: 13px;
            color: #555;
            text-align: center;
            line-height: 1.5;
            font-weight: 500;
            z-index: 1;
        }

        .cert-date {
            font-size: 12px;
            color: #bbb;
            font-weight: 600;
            margin-top: 5px;
            z-index: 1;
        }

        /* 마스코트 이미지 크기 조정 */
        .end-mascot-cert {
            width: 110px; /* 140px에서 축소 */
            height: 110px;
            object-fit: contain;
            margin: 5px 0;
            z-index: 1;
        }

        /* 새로 추가된 안내 문구 스타일 (블루/시안 테마) */
        .cert-notice {
            background: rgba(0, 242, 254, 0.08);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            color: #0076ad;
            font-weight: 700;
            text-align: center;
            margin-top: 4px;
            word-break: keep-all;
            border: 1px dashed rgba(0, 242, 254, 0.3);
            width: 90%;
            z-index: 1;
        }

        .cert-notice b {
            color: #005a87;
        }

        .mascot-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            z-index: 1;
        }

        .mascot-thumb {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #f0f0f0;
            border: 4px solid #fff;
            cursor: pointer;
            overflow: hidden;
            transition: 0.3s;
        }

        .mascot-thumb.active {
            border-color: #d4af37;
            transform: scale(1.15);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .mascot-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .cert-bottom-area {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            align-items: center;
            z-index: 10;
        }

        .cert-actions {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37, #f1c40f);
            color: #000 !important;
            font-weight: 900;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            color: #fff;
            backdrop-filter: blur(10px);
        }

        /* --- Start Layer --- */
        .hidden {
            display: none !important;
        }

        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 360px) {
            .slot {
                max-width: 55px;
                height: 65px;
                font-size: 2rem;
            }

            .m-char {
                font-size: 1.5rem;
            }

            .cert-card {
                padding: 30px 15px;
                border-width: 10px;
            }

            .fail-text {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="stars-container" id="stars"></div>

    <div id="screen-main">

        };
        const LETTER_COLORS = {
            'A': '#FF3D00', 'B': '#3D5AFE', 'C': '#00E676', 'D': '#FFEA00', 'E': '#FF1744',
            'F': '#D500F9', 'G': '#00B0FF', 'H': '#1DE9B6', 'I': '#C6FF00', 'J': '#FF9100',
            'K': '#FF3D00', 'L': '#3D5AFE', 'M': '#00E676', 'N': '#FFEA00', 'O': '#FF1744',
            'P': '#D500F9', 'Q': '#00B0FF', 'R': '#1DE9B6', 'S': '#C6FF00', 'T': '#FF9100',
            'U': '#FF3D00', 'V': '#3D5AFE', 'W': '#00E676', 'X': '#FFEA00', 'Y': '#FF1744', 'Z': '#D500F9'
        };
        const COLORS = {
            'A': '#FF3D00', 'B': '#3D5AFE', 'C': '#00E676', 'D': '#FFEA00', 'E': '#FF1744',
            'F': '#D500F9', 'G': '#00B0FF', 'H': '#1DE9B6', 'I': '#C6FF00', 'J': '#FF9100',
            'K': '#FF3D00', 'L': '#3D5AFE', 'M': '#00E676', 'N': '#FFEA00', 'O': '#FF1744',
            'P': '#D500F9', 'Q': '#00B0FF', 'R': '#1DE9B6', 'S': '#C6FF00', 'T': '#FF9100',
            'U': '#FF3D00', 'V': '#3D5AFE', 'W': '#00E676', 'X': '#FFEA00', 'Y': '#FF1744', 'Z': '#D500F9'
        };

        // --- Starfield Initialization ---
        function createStars() {
            const container = document.getElementById('stars');
            if (!container) return;
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDuration = `${Math.random() * 3 + 2}s`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(star);
            }
        }
        createStars();

        // --- State ---
        let userInput = [];
        let attempts = 0;
        let startTime = null;

        // --- Persistence Logic ---
        function checkCompletion() {
            const savedData = localStorage.getItem('morse_completed_data');
            if (savedData) {
                const data = JSON.parse(savedData);
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-main').classList.add('hidden');
                document.getElementById('screen-certificate').classList.add('active');

                document.getElementById('res-nick').innerText = data.name;
                document.getElementById('res-time').innerText = data.time;
                document.getElementById('res-attempts').innerText = data.attempts;
                document.getElementById('cert-date').innerText = data.date;
            }
        }
        window.addEventListener('load', checkCompletion);

        function startMission() {
            const name = document.getElementById('login-agent-name').value.trim();
            if (!name) {
                alert("요원명을 입력해주세요!");
                return;
            }
            document.getElementById('display-agent-name').innerText = name;
            document.getElementById('screen-login').classList.add('hidden');
            startTime = Date.now();
        }

        function fireConfetti() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function () {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, {
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                    colors: ['#00f0ff', '#d4af37']
                }));
                confetti(Object.assign({}, defaults, {
                    particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                    colors: ['#00f0ff', '#d4af37']
                }));
            }, 250);
        }

        // --- Core Logic ---
        const grid = document.getElementById('morseGrid');
        Object.keys(MORSE).forEach(key => {
            const btn = document.createElement('div');
            btn.className = 'morse-btn';
            btn.id = `btn-${key}`;
            btn.innerHTML = `<span class="m-char">${key}</span><div class="m-code">${MORSE[key].split('').map(c => `<div class="${c === '.' ? 'dot' : 'dash'}"></div>`).join('')
                }</div>`;
            btn.onclick = () => inputLetter(key);
            grid.appendChild(btn);
        });

        const slots = [
            document.getElementById('slot0'), document.getElementById('slot1'),
            document.getElementById('slot2'), document.getElementById('slot3')
        ];

        function inputLetter(key) {
            if (userInput.length >= 4) return;
            userInput.push(key);

            // 버튼 강조
            const btn = document.getElementById(`btn-${key}`);
            if (btn) {
                btn.classList.add('active');
                btn.style.borderColor = LETTER_COLORS[key];
                btn.style.background = `${LETTER_COLORS[key]}22`;
                btn.querySelector('.m-char').style.color = LETTER_COLORS[key];
            }

            updateDisplay();
        }

        function clearInput() {
            userInput = [];
            // 모든 버튼 초기화
            document.querySelectorAll('.morse-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.style.borderColor = "";
                btn.style.background = "";
                btn.querySelector('.m-char').style.color = "";
            });
            updateDisplay();
        }

        function updateDisplay() {
            slots.forEach((slot, idx) => {
                const char = userInput[idx];
                slot.innerText = char || "";
                slot.classList.toggle('active', idx === userInput.length);
                slot.classList.toggle('filled', !!char);
                if (char) {
                    slot.style.color = COLORS[char];
                    slot.style.borderColor = COLORS[char];
                } else {
                    slot.style.color = "";
                    slot.style.borderColor = "";
                }
            });
        }

        function validate() {
            if (userInput.length < 4) return;
            attempts++;
            if (userInput.join('') === TARGET) {
                showSuccess();
            } else {
                showFailure();
            }
        }

        function showFailure() {
            const layer = document.getElementById('fail-layer');
            layer.style.display = 'flex';
            layer.classList.add('active');
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            setTimeout(() => {
                layer.classList.remove('active');
                layer.style.display = 'none';
                clearInput();
            }, 1000);
        }

        function showSuccess() {
            const scan = document.getElementById('scan-layer');
            const fill = document.getElementById('progress-fill');

            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const fullDate = `${now.getFullYear()}.${now.getMonth() + 1}.${now.getDate()} ${timeStr}`;

            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(elapsed / 60);
            const s = elapsed % 60;
            const elapsedStr = `${m}:${String(s).padStart(2, '0')}`;
            const agentName = document.getElementById('display-agent-name').innerText;

            // 1. 데이터 채우기
            document.getElementById('res-nick').innerText = agentName;
            document.getElementById('res-time').innerText = elapsedStr;
            document.getElementById('res-attempts').innerText = attempts + '회';
            document.getElementById('cert-date').innerText = fullDate;

            localStorage.setItem('morse_completed_data', JSON.stringify({
                name: agentName,
                time: elapsedStr,
                attempts: attempts + '회',
                date: fullDate
            }));

            // 2. 스캔 화면 표시
            scan.classList.add('active');
            setTimeout(() => fill.style.width = "100%", 100);

            // 3. 화면 전환 (미리 굽기 로직 제거, 바로 인증서 화면으로 이동)
            setTimeout(() => {
                scan.style.opacity = "0";
                setTimeout(() => {
                    scan.classList.remove('active');
                    document.getElementById('screen-main').classList.add('hidden');
                    document.getElementById('screen-certificate').classList.add('active');
                    fireConfetti();
                }, 500);
            }, 1500); // 게이지 차오르는 시간 대기
        }

        async function saveCertificate() {
            const name = document.getElementById('display-agent-name').innerText;
            const card = document.getElementById('cert-card');
            const btn = document.querySelector('.btn-gold');

            const originalText = btn.innerText;
            btn.innerText = "⏳ 이미지 굽는 중...";
            btn.disabled = true;

            // 🌟 핵심 1: 투명도 버그 방지를 위해 캡처 직전 애니메이션 강제 해제
            const originalAnimation = card.style.animation;
            card.style.animation = 'none';
            card.style.opacity = '1';
            card.style.transform = 'none';

            // DOM이 스타일 변경을 반영할 수 있도록 아주 잠시 대기
            await new Promise(resolve => setTimeout(resolve, 50));

            try {
                const imgs = card.getElementsByTagName('img');
                await Promise.all(Array.from(imgs).map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(res => { img.onload = res; img.onerror = res; });
                }));

                const canvas = await html2canvas(card, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: null, // 🌟 핵심 2: 둥근 모서리 바깥쪽 하얀 여백을 투명하게 처리
                    logging: false
                });

                canvas.toBlob((blob) => {
                    if (blob) {
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = `Cosmic_Cert_${name}.png`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url); // 메모리 누수 방지
                    }
                    restoreBtn();
                }, 'image/png');

            } catch (e) {
                console.error("Rendering failed:", e);
                alert("이미지 저장에 실패했습니다. 다운로드가 안 된다면 화면을 캡처해주세요!");
                restoreBtn();
            }

            // 버튼 및 애니메이션 상태 원상 복구
            function restoreBtn() {
                btn.innerText = originalText;
                btn.disabled = false;
                card.style.animation = originalAnimation;
            }
        }
    </script>
</body>

</html>
